services:
  vpn:
    image: alpine/openconnect
    container_name: vpn-{{pod_id}}
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices: [/dev/net/tun]
    environment:
      OPENCONNECT_PASSWORD: {{vpn_pass}}
      OPENCONNECT_USER: {{vpn_user}}
      OPENCONNECT_URL: {{vpn_host}}
    command: >
      sh -c 'echo "$$OPENCONNECT_PASSWORD" |
        openconnect --interface tun0
          --user "$$OPENCONNECT_USER"
          --passwd-on-stdin
          --script-tun
          "$$OPENCONNECT_URL"'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "{{vmanage_ip}}"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  pipeline:
    image: pod-automator:latest
    container_name: pipeline-{{pod_id}}
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      POD_ID: {{pod_id}}
      VMANAGE: {{vmanage_ip}}
      VMANAGE_USER: {{vmanage_user}}
      VMANAGE_PASS: {{vmanage_pass}}
      ROUTER_IP: {{router_ip}}
      ROUTER_USER: {{router_user}}
      ROUTER_PASS: {{router_pass}}
      JUMP_HOST: {{jump_host}}
      JUMP_USER: {{jump_user}}
      JUMP_PASS: {{jump_pass}}
    volumes:
      - {{pod_id}}-bootstrap:/pipeline/data/bootstrap
      - {{pod_id}}-ssh:/root/.ssh
    command: ["--serial", "{{serial}}"]
    restart: "no"

volumes:
  {{pod_id}}-bootstrap:
  {{pod_id}}-ssh:
