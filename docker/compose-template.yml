services:
  vpn:
    image: pod-automator:latest
    container_name: vpn-{{pod_id}}
    cap_add: [NET_ADMIN, SYS_ADMIN]
    devices: [/dev/net/tun]
    entrypoint: ["/bin/sh", "/vpn-entrypoint.sh"]
    command: ["{{vpn_host}}", "{{vpn_user}}", "{{vpn_pass}}"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('{{vmanage_ip}}', 443), timeout=3).close()"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 10s

  pipeline:
    image: pod-automator:latest
    container_name: pipeline-{{pod_id}}
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      POD_ID: {{pod_id}}
      SERIAL: {{serial}}
      VMANAGE: {{vmanage_ip}}
      VMANAGE_USER: {{vmanage_user}}
      VMANAGE_PASS: {{vmanage_pass}}
      ROUTER_IP: {{router_ip}}
      ROUTER_USER: {{router_user}}
      ROUTER_PASS: {{router_pass}}
    volumes:
      - {{pod_id}}-bootstrap:/pipeline/data/bootstrap
      - {{host_data}}:/pipeline/host-data
    restart: "no"

volumes:
  {{pod_id}}-bootstrap:
